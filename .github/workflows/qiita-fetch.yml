name: Qiita Fetch

on:
  schedule:
    # 毎日午前9時（日本時間）に実行する場合 (UTCでは午前0時)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動でいつでも実行できるようにするボタンを追加

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を明示的に付与

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Fetch from Qiita
        run: qiita fetch
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}

      - name: Check for changes & Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 変更があるか確認
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: fetch latest articles from Qiita [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected."
          fi
