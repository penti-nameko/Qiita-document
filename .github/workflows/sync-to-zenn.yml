name: Sync to Zenn (New Diff Only)

on:
  push:
    branches:
      - main
    paths:
      - 'public/**/*.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Qiita Repo
        uses: actions/checkout@v4
        with:
          path: qiita-repo
          fetch-depth: 0 # 差分（git diff）計算用

      - name: Checkout Zenn Repo
        uses: actions/checkout@v4
        with:
          repository: penti-nameko/Zenn_document
          token: ${{ secrets.ZENN_SYNC_TOKEN }}
          path: zenn-repo

      - name: Copy, Convert & Format for Zenn (New Files Only)
        run: |
          mkdir -p zenn-repo/articles
          
          cd qiita-repo
          
          # 手動実行時は全ファイルを走査対象にし、通常push時は直前の差分を対象にする
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger: Scanning all files for unsynced articles..."
            FILES=$(find public -name "*.md")
          else
            echo "Push trigger: Detecting changed files..."
            FILES=$(git diff --name-only HEAD~1 HEAD | grep '^public/.*\.md$' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No markdown changes detected."
            exit 0
          fi

          # 抽出したファイルをループ処理
          for file_path in $FILES; do
            if [ -f "$file_path" ]; then
              file=$(basename "$file_path")
              
              # 【追加条件】Zennリポジトリの articles/ 内に同名ファイルが既に存在するかチェック
              if [ -f "../zenn-repo/articles/$file" ]; then
                echo "Skipping: $file (Already exists in Zenn repo)"
                continue
              fi

              echo "Processing NEW file: $file"
              
              # --- 1. メタデータの抽出処理 ---
              TITLE=$(sed -n 's/^title:[[:space:]]*//p' "$file_path" | sed 's/^[ "'\'']*//;s/[ "'\'']*$//')
              [ -z "$TITLE" ] && TITLE="Untitled"

              IS_PRIVATE=$(sed -n 's/^private:[[:space:]]*//p' "$file_path" | tr -d '[:space:]')
              if [ "$IS_PRIVATE" = "true" ]; then
                PUBLISHED="false"
              else
                PUBLISHED="true"
              fi

              TOPICS=$(sed -n '/^tags:/,/^[a-zA-Z]/p' "$file_path" | grep '^[[:space:]]*-' | sed 's/^[[:space:]]*-//;s/^[[:space:]]*//;s/[[:space:]]*$//' | awk '{print "\""$0"\""}' | paste -sd, -)
              [ -z "$TOPICS" ] && TOPICS='"qiita"'

              # --- 2. Zenn用フロントマターの出力 ---
              TARGET_FILE="../zenn-repo/articles/$file"
              
              echo "---" > "$TARGET_FILE"
              echo "title: \"$TITLE\"" >> "$TARGET_FILE"
              echo "emoji: \"💻\"" >> "$TARGET_FILE"
              echo "type: \"tech\"" >> "$TARGET_FILE"
              echo "topics: [$TOPICS]" >> "$TARGET_FILE"
              echo "published: $PUBLISHED" >> "$TARGET_FILE"
              echo "---" >> "$TARGET_FILE"
              echo "" >> "$TARGET_FILE"

              # --- 3. 本文のみを抽出して結合 ---
              BODY_START=$(awk '/^---$/ {count++; if(count==2) {print NR; exit}}' "$file_path")
              if [ -n "$BODY_START" ]; then
                tail -n +$((BODY_START + 1)) "$file_path" >> "$TARGET_FILE"
              else
                cat "$file_path" >> "$TARGET_FILE"
              fi
            fi
          done

      - name: Push to Zenn Repo
        run: |
          cd zenn-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add articles/*.md
            git commit -m "sync: automagic new items only from Qiita-document"
            git push origin main
          else
            echo "No new unsynced files found to commit."
          fi
