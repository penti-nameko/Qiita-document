name: Sync to Zenn

on:
  push:
    branches:
      - main
    paths:
      - 'public/**/*.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Qiita Repo
        uses: actions/checkout@v4
        with:
          path: qiita-repo

      - name: Checkout Zenn Repo
        uses: actions/checkout@v4
        with:
          repository: penti-nameko/Zenn_document
          token: ${{ secrets.ZENN_SYNC_TOKEN }}
          path: zenn-repo

      - name: Copy, Convert & Format for Zenn
        run: |
          mkdir -p zenn-repo/articles
          
          cd qiita-repo/public
          for file in *.md; do
            if [ -f "$file" ]; then
              echo "Processing: $file"
              
              # --- 1. メタデータの高度な抽出処理 ---
              # タイトルを抽出（前後のクォーテーションや余計な文字を排除）
              TITLE=$(sed -n 's/^title:[[:space:]]*//p' "$file" | sed 's/^[ "'\'']*//;s/[ "'\'']*$//')
              [ -z "$TITLE" ] && TITLE="Untitled"

              # 公開ステータス（private: false なら Zenn側は published: true）
              IS_PRIVATE=$(sed -n 's/^private:[[:space:]]*//p' "$file" | tr -d '[:space:]')
              if [ "$IS_PRIVATE" = "true" ]; then
                PUBLISHED="false"
              else
                PUBLISHED="true"
              fi

              # タグ（tags）の抽出。インデントされた「- タグ名」を正確に取得してカンマ区切りにする
              # 複数行に渡るタグを配列 ["タグ1", "タグ2"] 形式に整形
              TOPICS=$(sed -n '/^tags:/,/^[a-zA-Z]/p' "$file" | grep '^[[:space:]]*-' | sed 's/^[[:space:]]*-//;s/^[[:space:]]*//;s/[[:space:]]*$//' | awk '{print "\""$0"\""}' | paste -sd, -)
              
              # Zennはtopicsが空、または文字数が少ないとエラーになるため、空ならデフォルト値をセット
              if [ -z "$TOPICS" ]; then
                TOPICS='"qiita"'
              fi

              # --- 2. Zenn用フロントマターの出力 ---
              TARGET_FILE="../../zenn-repo/articles/$file"
              
              echo "---" > "$TARGET_FILE"
              echo "title: \"$TITLE\"" >> "$TARGET_FILE"
              echo "emoji: \"💻\"" >> "$TARGET_FILE" # 必要に応じてデフォルト絵文字を変更してください
              echo "type: \"tech\"" >> "$TARGET_FILE"
              echo "topics: [$TOPICS]" >> "$TARGET_FILE"
              echo "published: $PUBLISHED" >> "$TARGET_FILE"
              echo "---" >> "$TARGET_FILE"
              echo "" >> "$TARGET_FILE"

              # --- 3. 本文のみを抽出して結合 ---
              # 2つ目の「---」の行番号を特定し、それより下の行（本文）だけを出力
              BODY_START=$(awk '/^---$/ {count++; if(count==2) {print NR; exit}}' "$file")
              if [ -n "$BODY_START" ]; then
                tail -n +$((BODY_START + 1)) "$file" >> "$TARGET_FILE"
              else
                # 万が一フロントマターのパースに失敗した場合は丸ごとコピー
                cat "$file" >> "$TARGET_FILE"
              fi
            fi
          done

      - name: Push to Zenn Repo
        run: |
          cd zenn-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add articles/*.md
            git commit -m "sync: automagic build and format from Qiita-document"
            git push origin main
          else
            echo "No changes detected to sync."
          fi
